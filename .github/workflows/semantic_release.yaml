name: Create Release
on:
  push:
    branches:
      - main
jobs:
  release:
    name: release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

# NEW: Debugging step to see what the runner sees
      - name: Debug Git Context
        run: |
          echo "--- Current Branch ---"
          git branch --show-current
          echo "--- Last 5 Tags ---"
          git tag --sort=-v:refname | head -n 5
          echo "--- Last 5 Commits ---"
          git log -n 5 --oneline

      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v4
        id: semantic
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          branches: '["main"]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          REGISTRY_SERVER_URL: 'http://34.124.124.81:4873/'

      - name: Create upm branch
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          # Configure bot identity
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Split the package folder into its own branch
          git branch -d upm &> /dev/null || echo "upm branch not found locally"
          git subtree split -P "$PKG_ROOT" -b upm
          git checkout upm

          # Unity UPM convention: Rename Samples to Samples~ 
          # (This hides them from the main project but keeps them importable via Package Manager)
          if [[ -d "Samples" ]]; then
            git mv Samples Samples~
            rm -f Samples.meta
            git commit -am "fix: Samples => Samples~ for UPM"
          fi

          # Force push the isolated package code to the 'upm' branch
          git push -f origin upm
          
          # FETCH existing tags for conetext
          git fetch --tags --force

          # Create and push the version tag specifically for the upm branch
          git tag -f $TAG upm
          git push origin -f --tags
        env:
          PKG_ROOT: Packages/com.pakforge.inspectorbutton
          TAG: ${{ steps.semantic.outputs.new_release_version }}
      
      - name: Setup Node
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: ${{ env.REGISTRY_SERVER_URL }}
    
      # Command to install the package dependencies
      - name: Publish to Private Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          # We are already on the 'upm' branch from the previous step
          # Ensure dependencies are installed if your package requires a build step
          yarn install --frozen-lockfile || npm install
          
          npm publish --registry "${{ env.REGISTRY_SERVER_URL }}"
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}} 
          REGISTRY_SERVER_URL: 'http://34.124.124.81:4873/'
